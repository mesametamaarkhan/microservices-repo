apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - vote-deployment.yaml
  - vote-service.yaml
  - result-deployment.yaml
  - result-service.yaml
  - worker-deployment.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - db-deployment.yaml
  - db-service.yaml

images:
  - name: vote-image
    newName: 22i1179/vote
    newTag: v1
  - name: result-image
    newName: 22i1179/result
    newTag: v1
  - name: worker-image
    newName: 22i1179/worker
    newTag: v1
