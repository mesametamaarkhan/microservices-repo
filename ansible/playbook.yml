- hosts: server
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - docker.io
          - curl
          - snapd
        state: present

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: true

    - name: Install MicroK8s
      snap:
        name: microk8s
        classic: true
        state: present

    - name: Add ubuntu user to Docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Add ubuntu user to MicroK8s group
      user:
        name: ubuntu
        groups: microk8s
        append: true

    - name: Wait for MicroK8s to become ready
      command: microk8s status --wait-ready
      changed_when: false

    - name: Enable DNS addon
      command: microk8s enable dns
      register: dns_enable
      changed_when: "'Nothing to do' not in dns_enable.stdout"

    - name: Display reminder about shell group refresh
      debug:
        msg: "Reconnect via SSH before using docker or microk8s as ubuntu so the new group membership is applied."
